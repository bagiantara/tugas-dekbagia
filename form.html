<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Data Mahasiswa</title>
<link rel="stylesheet" href="style.css">

<style>

body{
    background: linear-gradient(135deg,#007bff,#00c6ff);
}

/* Box form */
.form-box{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* Label */
.form-box label{
    font-weight:bold;
    display:block;
    margin-bottom:5px;
}

/* Input */
.form-box input,
.form-box textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    margin-bottom:15px;
    font-size:14px;
    transition:0.3s;
}

/* Efek saat klik */
.form-box input:focus,
.form-box textarea:focus{
    border-color:#007bff;
    outline:none;
    box-shadow:0 0 5px rgba(0,123,255,0.5);
}

/* Tombol */
.btn-submit{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#007bff;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.btn-submit:hover{
    background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>FORM DATA MAHASISWA</h1>
</div>

<div class="form-box">

<form>

<label>👤 Nama Lengkap</label>
<input type="text" placeholder="Masukkan nama lengkap">

<label>🆔 NIM</label>
<input type="text" placeholder="Masukkan NIM">

<label>💻 Program Studi</label>
<input type="text" placeholder="Masukkan Program Studi">

<label>📚 Semester</label>
<input type="number" placeholder="Semester">

<label>📍 Alamat</label>
<textarea placeholder="Masukkan alamat"></textarea>

<button type="submit" class="btn-submit">Kirim Data</button>

</form>

</div>

<div class="contact-box" style="margin-top:20px;">
<a href="index.html" class="btn-wa">Kembali ke Biodata</a>
</div>

<footer>
<p>&copy; 2026 Kadek Bagiantara Putra</p>
</footer>

</div>

</body>
</html>
