<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendidikan - Kadek Bagiantara Putra</title>
<link rel="stylesheet" href="style.css">

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#007bff,#00c6ff);
    margin:0;
}

/* container */
.container{
    width:90%;
    max-width:900px;
    margin:50px auto;
}

/* header */
.header{
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* education list */
.education-list{
    margin-top:25px;
}

/* card pendidikan */
.edu-card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
    display:flex;
    align-items:center;
    gap:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
    transition:0.3s;
}

.edu-card:hover{
    transform:translateY(-5px);
}

/* icon */
.edu-icon{
    font-size:30px;
}

/* text */
.edu-text{
    font-size:16px;
    font-weight:500;
}

/* tombol kembali */
.btn-back{
    display:inline-block;
    margin-top:20px;
    padding:10px 20px;
    background:#007bff;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

.btn-back:hover{
    background:#0056b3;
}

/* footer */
footer{
    text-align:center;
    margin-top:30px;
    color:white;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>🎓 Riwayat Pendidikan</h1>
<p>Berikut perjalanan pendidikan saya dari awal hingga sekarang</p>
</div>

<div class="education-list">

<div class="edu-card">
<div class="edu-icon">🧸</div>
<div class="edu-text">TK Windu Kencana</div>
</div>

<div class="edu-card">
<div class="edu-icon">🏫</div>
<div class="edu-text">SD Negeri 5 Penatih</div>
</div>

<div class="edu-card">
<div class="edu-icon">📚</div>
<div class="edu-text">SMP PGRI 9 Denpasar</div>
</div>

<div class="edu-card">
<div class="edu-icon">💻</div>
<div class="edu-text">SMK Negeri 1 Denpasar</div>
</div>

<div class="edu-card">
<div class="edu-icon">🎓</div>
<div class="edu-text">Universitas Hindu Negeri I Gusti Bagus Sugriwa Denpasar (Sekarang)</div>
</div>

</div>

<div style="text-align:center;">
<a href="index.html" class="btn-back">Kembali ke Beranda</a>
</div>

<footer>
<p>&copy; 2026 Kadek Bagiantara Putra</p>
</footer>

</div>

</body>
</html>
